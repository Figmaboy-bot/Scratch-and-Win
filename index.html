<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratch & Win</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
      -webkit-user-select: none;
    }

    img {
      -webkit-user-drag: none;
      user-drag: none;
      pointer-events: none;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      font-family: 'Inter Tight', sans-serif;
    }

    .card-wrap {
      position: relative;
    }

    /* Left and right ticket notches */
    .card-wrap::before,
    .card-wrap::after {
      content: '';
      position: absolute;
      width: 72px;
      height: 72px;
      background: #e8e8e8;
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
    }
    .card-wrap::before { left: -36px; }
    .card-wrap::after  { right: -36px; }

    .card {
      position: relative;
      width: 500px;
      height: 300px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 6px 32px rgba(0, 0, 0, 0.10);
    }

    .blob-corner {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .blob-corner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gift-outer {
      position: absolute;
      right: 8px;
      top: 115px;
      width: 215px;
      height: 215px;
      z-index: 1;
    }
    .gift-outer img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .content {
      position: absolute;
      left: 54px;
      top: 44px;
      width: 235px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      z-index: 1;
    }

    .logo {
      height: 24px;
      width: auto;
      display: block;
    }

    .text-block {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .heading {
      font-size: 22px;
      font-weight: 600;
      color: #000;
      line-height: 1.2;
    }

    .subtext {
      font-size: 13px;
      font-weight: 500;
      color: rgba(0, 0, 0, 0.6);
      line-height: 1.45;
    }

    .promo-code {
      position: absolute;
      left: 54px;
      top: 224px;
      width: 222px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1.5px dashed #00932a;
      background: rgba(0, 147, 42, 0.02);
      cursor: pointer;
      user-select: none;
      z-index: 1;
      transition: background 0.15s ease;
    }
    .promo-code:hover { background: rgba(0, 147, 42, 0.07); }

    .promo-text {
      font-size: 13px;
      font-weight: 500;
      color: #00932a;
      white-space: nowrap;
      letter-spacing: 0.6px;
    }

    .copy-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.8;
    }

    /* Scratch canvas — no border-radius; parent overflow:hidden clips it */
    #scratch-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 500px;
      height: 300px;
      z-index: 5;
      cursor: crosshair; /* overridden by JS with coin data-URL */
    }

    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #1a1a1a;
      color: #fff;
      font-family: 'Inter Tight', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 9px 18px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>

<body>

  <div class="card-wrap">
    <div class="card">

      <div class="blob-corner">
        <img src="https://www.figma.com/api/mcp/asset/082f750e-816e-4599-a795-3c23de591655" alt="" />
      </div>

      <div class="gift-outer">
        <img src="Image/OBJECT.svg" alt="Gift box character" />
      </div>

      <div class="content">
        <img class="logo" src="Image/Logo.svg" alt="Amazon" />
        <div class="text-block">
          <p class="heading">Scratch &amp; Win Big 🎉</p>
          <p class="subtext">Scratch the ticket for a chance to win exciting rewards, cashback, and surprise gifts.</p>
        </div>
      </div>

      <button class="promo-code" onclick="copyCode()" aria-label="Copy promo code AMZ8942">
        <span class="promo-text">AMZ8942</span>
        <svg id="copy-icon" class="copy-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="7" y="5" width="10" height="12" rx="1.5" stroke="#00932a" stroke-width="1.5"/>
          <path d="M13 5V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h3" stroke="#00932a" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>

      <canvas id="scratch-canvas"></canvas>

    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    /* ══════════════════════════════════════════
       COIN CURSOR  (drawn programmatically)
    ══════════════════════════════════════════ */
    function buildSilverCoinCursor() {
      const size = 72;
      const c = document.createElement('canvas');
      c.width = size; c.height = size;
      const x = c.getContext('2d');
      const cx = size / 2, cy = size / 2;
      const r  = size * 0.43;

      // Drop shadow
      x.save();
      x.shadowColor   = 'rgba(0,0,0,0.55)';
      x.shadowBlur    = 9;
      x.shadowOffsetX = 2;
      x.shadowOffsetY = 5;

      // Base disc
      x.beginPath();
      x.arc(cx, cy, r, 0, Math.PI * 2);
      const baseG = x.createRadialGradient(cx - r * 0.28, cy - r * 0.32, r * 0.04, cx, cy, r);
      baseG.addColorStop(0,   '#f0f0f0');
      baseG.addColorStop(0.35,'#c8c8c8');
      baseG.addColorStop(0.7, '#9e9e9e');
      baseG.addColorStop(1,   '#606060');
      x.fillStyle = baseG;
      x.fill();
      x.restore();

      // Inner raised face
      x.beginPath();
      x.arc(cx, cy, r * 0.84, 0, Math.PI * 2);
      const faceG = x.createRadialGradient(cx - r * 0.22, cy - r * 0.3, r * 0.04, cx, cy, r * 0.84);
      faceG.addColorStop(0,   '#ffffff');
      faceG.addColorStop(0.25,'#e2e2e2');
      faceG.addColorStop(0.65,'#b8b8b8');
      faceG.addColorStop(1,   '#888888');
      x.fillStyle = faceG;
      x.fill();

      // Reeded edge ticks
      for (let i = 0; i < 40; i++) {
        const a = (i / 40) * Math.PI * 2;
        x.save();
        x.strokeStyle = 'rgba(50,50,50,0.22)';
        x.lineWidth   = 1.2;
        x.beginPath();
        x.moveTo(cx + Math.cos(a) * r * 0.86, cy + Math.sin(a) * r * 0.86);
        x.lineTo(cx + Math.cos(a) * r,        cy + Math.sin(a) * r);
        x.stroke();
        x.restore();
      }

      // Center emblem — star
      x.save();
      x.fillStyle = 'rgba(70,70,70,0.72)';
      const sr = r * 0.32, ir = r * 0.14, pts = 5;
      x.beginPath();
      for (let i = 0; i < pts * 2; i++) {
        const a   = (i / (pts * 2)) * Math.PI * 2 - Math.PI / 2;
        const rad = i % 2 === 0 ? sr : ir;
        i === 0
          ? x.moveTo(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad)
          : x.lineTo(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad);
      }
      x.closePath();
      x.fill();
      x.restore();

      // Top-left specular highlight arc
      x.save();
      x.beginPath();
      x.arc(cx, cy, r * 0.68, Math.PI * 1.05, Math.PI * 1.65);
      x.strokeStyle = 'rgba(255,255,255,0.75)';
      x.lineWidth   = r * 0.13;
      x.lineCap     = 'round';
      x.stroke();
      x.restore();

      // Small bottom-right secondary shine
      x.save();
      x.beginPath();
      x.arc(cx, cy, r * 0.55, Math.PI * 0.1, Math.PI * 0.38);
      x.strokeStyle = 'rgba(255,255,255,0.3)';
      x.lineWidth   = r * 0.07;
      x.lineCap     = 'round';
      x.stroke();
      x.restore();

      canvas.style.cursor = `url(${c.toDataURL()}) ${Math.round(cx)} ${Math.round(cy)}, crosshair`;
    }

    /* ══════════════════════════════════════════
       GOLD TEXTURE  (per-pixel brushed metal)
    ══════════════════════════════════════════ */
    const canvas = document.getElementById('scratch-canvas');
    const ctx    = canvas.getContext('2d');
    const W = 500, H = 300;
    canvas.width  = W;
    canvas.height = H;

    /* ══════════════════════════════════════════
       DUST PARTICLE CANVAS
    ══════════════════════════════════════════ */
    const pCanvas = document.createElement('canvas');
    pCanvas.width  = window.innerWidth;
    pCanvas.height = window.innerHeight;
    Object.assign(pCanvas.style, {
      position: 'fixed', top: '0', left: '0',
      width: '100vw', height: '100vh',
      zIndex: '9999', pointerEvents: 'none',
    });
    document.body.appendChild(pCanvas);
    const pctx = pCanvas.getContext('2d');

    const DUST_COLORS = ['#C8A020','#D4B030','#E0C040','#B89018','#A07010','#CCA828','#E8D060'];
    const dustParts   = [];
    let dustRunning   = false;
    let dustDist      = 0;

    function spawnDust(cx, cy) {
      const count = 5 + Math.floor(Math.random() * 5);
      for (let i = 0; i < count; i++) {
        dustParts.push({
          x:      cx + (Math.random() - 0.5) * 28,
          y:      cy + Math.random() * 4,
          vx:     (Math.random() - 0.5) * 0.7,   // gentle horizontal drift
          vy:     0.4 + Math.random() * 1.8,      // falls downward from the start
          g:      0.025 + Math.random() * 0.045,  // light gravity — dust is nearly weightless
          wobble: (Math.random() - 0.5) * 0.03,   // air-current sway per frame
          a:      0.35 + Math.random() * 0.55,
          decay:  0.006 + Math.random() * 0.01,   // slow fade so it drifts a long way
          r:      0.4 + Math.random() * 1.4,      // very fine particles
          color:  DUST_COLORS[Math.floor(Math.random() * DUST_COLORS.length)],
          flake:  Math.random() < 0.45,
          rot:    Math.random() * Math.PI * 2,
          rotV:   (Math.random() - 0.5) * 0.06,
        });
      }
    }

    function tickDust() {
      pctx.clearRect(0, 0, pCanvas.width, pCanvas.height);
      for (let i = dustParts.length - 1; i >= 0; i--) {
        const p = dustParts[i];
        p.vx   += p.wobble;
        p.vx   *= 0.995;       // gentle air resistance
        p.x    += p.vx;
        p.y    += p.vy;
        p.vy   += p.g;
        p.a    -= p.decay;
        p.rot  += p.rotV;
        if (p.a <= 0 || p.y > pCanvas.height) { dustParts.splice(i, 1); continue; }
        pctx.save();
        pctx.globalAlpha = p.a;
        pctx.fillStyle   = p.color;
        pctx.translate(p.x, p.y);
        if (p.flake) {
          pctx.rotate(p.rot);
          pctx.fillRect(-p.r, -p.r * 0.3, p.r * 2, p.r * 0.6);
        } else {
          pctx.beginPath();
          pctx.arc(0, 0, p.r * 0.5, 0, Math.PI * 2);
          pctx.fill();
        }
        pctx.restore();
      }
      if (dustParts.length > 0) requestAnimationFrame(tickDust);
      else dustRunning = false;
    }

    function emitDust(cx, cy) {
      // Convert card-local coords → viewport coords
      const rect = canvas.getBoundingClientRect();
      const vx = rect.left + cx * (rect.width  / W);
      const vy = rect.top  + cy * (rect.height / H);
      spawnDust(vx, vy);
      if (!dustRunning) { dustRunning = true; requestAnimationFrame(tickDust); }
    }

    /* ══════════════════════════════════════════
       SCRATCH MECHANIC  (rough stamp, no smooth edges)
    ══════════════════════════════════════════ */

    // Load gold texture — paint FIRST, then switch to destination-out
    const goldImg = new Image();
    goldImg.src = 'Image/gold-texture.png';
    goldImg.onload = function () {
      ctx.globalCompositeOperation = 'source-over';
      ctx.drawImage(goldImg, 0, 0, W, H);

      const vig = ctx.createRadialGradient(W / 2, H / 2, H * 0.25, W / 2, H / 2, H * 0.85);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle    = 'rgba(80,45,0,0.72)';
      ctx.font         = '600 14px "Inter Tight", sans-serif';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🪙  Scratch here to reveal your prize', W / 2, H / 2);

      ctx.globalCompositeOperation = 'destination-out';
    };

    buildSilverCoinCursor();

    let painting = false;
    let lastPos  = null;
    let revealed = false;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const src  = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * (W / rect.width),
        y: (src.clientY - rect.top)  * (H / rect.height),
      };
    }

    // Jagged irregular polygon stamp — mimics coin-on-foil scratch
    function roughStamp(cx, cy) {
      const verts  = 9 + Math.floor(Math.random() * 5);
      const baseR  = 24;
      const jitter = 11;
      ctx.beginPath();
      for (let i = 0; i <= verts; i++) {
        const angle = (i / verts) * Math.PI * 2;
        const r = baseR + (Math.random() - 0.5) * jitter * 2;
        i === 0
          ? ctx.moveTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r)
          : ctx.lineTo(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r);
      }
      ctx.closePath();
      ctx.fill();

      // Random thin flick lines for extra roughness
      if (Math.random() < 0.3) {
        const a = Math.random() * Math.PI * 2;
        const l = 7 + Math.random() * 14;
        ctx.lineWidth = 1 + Math.random() * 2.5;
        ctx.lineCap   = 'butt';
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(a) * l, cy + Math.sin(a) * l);
        ctx.stroke();
      }
    }

    function scratchTo(pos) {
      if (!lastPos) {
        roughStamp(pos.x, pos.y);
        emitDust(pos.x, pos.y);
        dustDist = 0;
      } else {
        const dx    = pos.x - lastPos.x;
        const dy    = pos.y - lastPos.y;
        const dist  = Math.sqrt(dx * dx + dy * dy);
        const steps = Math.max(1, Math.floor(dist / 5));
        for (let i = 1; i <= steps; i++) {
          const t = i / steps;
          roughStamp(lastPos.x + dx * t, lastPos.y + dy * t);
        }
        dustDist += dist;
        if (dustDist >= 8) {
          emitDust(pos.x, pos.y);
          dustDist = 0;
        }
      }
      lastPos = pos;
    }

    let revealTimer = null;
    function scheduleRevealCheck() {
      clearTimeout(revealTimer);
      revealTimer = setTimeout(checkReveal, 120);
    }

    function checkReveal() {
      if (revealed) return;
      const data  = ctx.getImageData(0, 0, W, H).data;
      let cleared = 0, total = 0;
      for (let i = 3; i < data.length; i += 24) {
        if (data[i] < 128) cleared++;
        total++;
      }
      if (cleared / total > 0.99) autoReveal();
    }

    function autoReveal() {
      revealed = true;
      canvas.style.transition    = 'opacity 0.7s ease';
      canvas.style.opacity       = '0';
      setTimeout(() => { canvas.style.pointerEvents = 'none'; }, 700);
    }

    // Mouse
    canvas.addEventListener('mousedown', (e) => { painting = true; lastPos = null; scratchTo(getPos(e)); });
    canvas.addEventListener('mousemove', (e) => { if (!painting) return; scratchTo(getPos(e)); scheduleRevealCheck(); });
    canvas.addEventListener('mouseup',    () => { painting = false; lastPos = null; checkReveal(); });
    canvas.addEventListener('mouseleave', () => { painting = false; lastPos = null; });

    // Touch
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); painting = true; lastPos = null; scratchTo(getPos(e)); }, { passive: false });
    canvas.addEventListener('touchmove',  (e) => { e.preventDefault(); if (!painting) return; scratchTo(getPos(e)); scheduleRevealCheck(); }, { passive: false });
    canvas.addEventListener('touchend',   () => { painting = false; lastPos = null; checkReveal(); });

    /* ── Copy promo ── */
    const COPY_PATHS  = `<rect x="7" y="5" width="10" height="12" rx="1.5" stroke="#00932a" stroke-width="1.5"/><path d="M13 5V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h3" stroke="#00932a" stroke-width="1.5" stroke-linecap="round"/>`;
    const CHECK_PATHS = `<circle cx="10" cy="10" r="7.5" stroke="#00932a" stroke-width="1.5"/><path d="M6.5 10.5l2.5 2.5 5-5" stroke="#00932a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>`;

    let copyTimer = null;
    function copyCode() {
      navigator.clipboard.writeText('AMZ8942').then(() => {
        document.getElementById('copy-icon').innerHTML = CHECK_PATHS;
        const t = document.getElementById('toast');
        t.classList.add('show');
        clearTimeout(copyTimer);
        copyTimer = setTimeout(() => {
          t.classList.remove('show');
          document.getElementById('copy-icon').innerHTML = COPY_PATHS;
        }, 2000);
      });
    }
  </script>

</body>
</html>
